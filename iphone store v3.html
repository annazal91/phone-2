<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>iPhone Store</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#EBAE29;--dark:#132228;--cream:#F5EED2;
  --gold-light:#f5c842;--text-dark:#132228;--text-muted:#5a6a70;
  --green:#22c55e;
}
body{font-family:'Inter',sans-serif;background:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(235,174,41,0.12) 0%,transparent 60%),linear-gradient(160deg,#132228 0%,#1a2f38 50%,#0d1a1f 100%);z-index:0;}
.container{position:relative;z-index:10;width:100%;max-width:420px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px 140px;}

/* BROWSER */
.browser-outer{width:100%;background:rgba(245,238,210,0.97);border-radius:18px;box-shadow:0 32px 80px rgba(0,0,0,0.5),0 0 0 1px rgba(235,174,41,0.2);overflow:hidden;animation:fadeUp 0.5s ease forwards;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* Chrome */
.chrome-bar{background:linear-gradient(180deg,#e8e0c8,#ddd5bc);padding:10px 14px 8px;display:flex;flex-direction:column;gap:7px;}
.chrome-dots{display:flex;gap:5px;}
.dot-r{width:10px;height:10px;border-radius:50%;background:#ff5f57;}
.dot-y{width:10px;height:10px;border-radius:50%;background:#ffbd2e;}
.dot-g{width:10px;height:10px;border-radius:50%;background:#28c840;}
.chrome-url{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.7);border-radius:6px;padding:4px 10px;border:1px solid rgba(0,0,0,0.08);}
.url-lock{font-size:9px;color:#5a7a5a;}
.url-text{font-size:10px;color:#2a3a2a;font-weight:500;}

/* Header */
.site-header{background:var(--dark);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
.site-logo{font-size:14px;font-weight:800;color:var(--gold);}
.site-nav{display:flex;gap:10px;align-items:center;}
.nav-link{font-size:9px;color:rgba(245,238,210,0.5);font-weight:500;}
.cart-btn{position:relative;background:var(--gold);border:none;border-radius:6px;padding:4px 9px;cursor:pointer;font-size:13px;}
.cart-count{position:absolute;top:-5px;right:-5px;width:14px;height:14px;background:#ef4444;border-radius:50%;font-size:8px;font-weight:700;color:white;display:flex;align-items:center;justify-content:center;}

/* Hero */
.site-hero{background:linear-gradient(135deg,#132228,#1e3540);padding:12px 16px;text-align:center;}
.hero-title{font-size:15px;font-weight:800;color:var(--cream);}
.hero-sub{font-size:9px;color:var(--gold);margin-top:2px;letter-spacing:0.08em;}

/* Grid */
.site-grid{padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px;background:var(--cream);}
.product-card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);border:1.5px solid transparent;transition:transform 0.2s,border-color 0.2s;}
.product-card.added{border-color:var(--green);animation:cardPulse 0.4s ease;}
@keyframes cardPulse{0%{transform:scale(1);}50%{transform:scale(1.04);}100%{transform:scale(1);}}

/* Phone image — no white bg */
.card-img{width:100%;height:88px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.card-phone-img{
  width:100%;height:100%;
  object-fit:contain;
  mix-blend-mode:multiply;
  filter:brightness(0.95) contrast(1.05);
}

.card-body{padding:8px;}
.card-name{font-size:10px;font-weight:700;color:var(--text-dark);margin-bottom:3px;}
.card-stars{font-size:9px;color:var(--gold);margin-bottom:5px;}
.memory-select{display:flex;gap:3px;margin-bottom:6px;}
.mem-btn{font-size:8px;font-weight:600;padding:2px 5px;border-radius:4px;border:1px solid rgba(19,34,40,0.2);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.15s;font-family:'Inter',sans-serif;}
.mem-btn.active{background:var(--dark);color:var(--gold);border-color:var(--dark);}
.add-btn{width:100%;padding:6px;background:var(--green);border:none;border-radius:7px;color:white;font-size:9px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;}
.add-btn:active{transform:scale(0.97);}

/* CART MODAL */
.cart-modal{display:none;position:fixed;inset:0;z-index:200;align-items:flex-end;justify-content:center;}
.cart-modal.open{display:flex;}
.cart-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);}
.cart-sheet{position:relative;z-index:201;width:100%;max-width:420px;background:var(--cream);border-radius:20px 20px 0 0;padding:20px;max-height:72vh;overflow-y:auto;animation:slideUp 0.35s cubic-bezier(0.34,1.2,0.64,1);}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.cart-handle{width:36px;height:3px;background:rgba(19,34,40,0.2);border-radius:2px;margin:0 auto 14px;}
.cart-title{font-size:15px;font-weight:800;color:var(--dark);margin-bottom:12px;}
.cart-item{display:flex;align-items:center;gap:10px;padding:10px;background:white;border-radius:10px;margin-bottom:8px;}
.cart-item-img{width:34px;height:42px;object-fit:contain;mix-blend-mode:multiply;}
.cart-item-info{flex:1;}
.cart-item-name{font-size:11px;font-weight:700;color:var(--dark);}
.cart-item-mem{font-size:9px;color:var(--text-muted);}
.cart-remove{background:none;border:none;cursor:pointer;font-size:14px;color:var(--text-muted);padding:4px;}
.cart-empty{text-align:center;padding:20px;font-size:12px;color:var(--text-muted);}
.place-btn{width:100%;padding:14px;background:var(--green);border:none;border-radius:12px;color:white;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px;font-family:'Inter',sans-serif;box-shadow:0 6px 20px rgba(34,197,94,0.3);transition:all 0.2s;}
.place-btn:hover{background:#16a34a;}

/* SUCCESS */
.success-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding-bottom:160px;}
.success-circle{width:76px;height:76px;background:linear-gradient(135deg,#166534,#22c55e);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 0 40px rgba(34,197,94,0.5);opacity:0;transform:scale(0);}
.success-circle.pop{animation:popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;}
@keyframes popIn{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1);}}
.success-title{font-size:22px;font-weight:800;color:var(--cream);text-align:center;opacity:0;}
.success-title.show{animation:fadeUp 0.5s ease 0.4s forwards;}

/* ROAD */
.road-scene{position:fixed;bottom:0;left:0;right:0;height:80px;opacity:0;transition:opacity 0.6s ease;z-index:50;}
.road-scene.show{opacity:1;}
.road{position:absolute;bottom:0;left:0;right:0;height:52px;background:#1a2a1a;border-top:3px solid var(--green);overflow:hidden;}
.road-stripe{position:absolute;top:50%;transform:translateY(-50%);height:4px;width:38px;background:rgba(255,255,255,0.22);border-radius:2px;animation:roadMove 0.65s linear infinite;}
@keyframes roadMove{from{left:110%;}to{left:-50px;}}

/* TRUCK left→right */
.truck-wrap{position:fixed;bottom:52px;left:-220px;transition:left 3.8s cubic-bezier(0.25,0.1,0.25,1);z-index:51;}
.truck-wrap.drive{left:110%;}

/* flip truck to face right */
.truck-wrap svg{transform:scaleX(-1);}

.on-way{font-size:22px;font-weight:800;color:var(--gold);text-align:center;position:fixed;bottom:62px;left:50%;transform:translateX(-50%);opacity:0;white-space:nowrap;z-index:52;transition:opacity 0.5s ease 2.8s;}
.on-way.show{opacity:1;}

/* CONFETTI */
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden;}
.confetti-piece{position:absolute;opacity:0;animation:confettiFall linear forwards;}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}80%{opacity:1;}100%{transform:translateY(105vh) rotate(720deg);opacity:0;}}

/* phase hidden */
.phase{display:none;flex-direction:column;align-items:center;width:100%;}
.phase.active{display:flex;}
</style>
</head>

let cart = [];
const selectedMem = ['128GB','128GB','128GB','128GB'];

function selectMem(idx, btn, mem) {
  selectedMem[idx] = mem;
  document.querySelectorAll('#mem'+idx+' .mem-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function addToCart(idx, name) {
  const btn = document.querySelector('#card'+idx+' .add-btn');
  btn.textContent = '✓ Added!'; btn.style.background = '#15803d';
  setTimeout(() => { btn.textContent = 'Add to Cart'; btn.style.background = ''; }, 1200);
  document.getElementById('card'+idx).classList.add('added');
  setTimeout(() => document.getElementById('card'+idx).classList.remove('added'), 500);
  cart.push({name, mem: selectedMem[idx], img: cartImgs[idx]});
  document.getElementById('cartCount').textContent = cart.length;
}

function openCart() {
  const el = document.getElementById('cartItems');
  if (cart.length === 0) {
    el.innerHTML = '<div class="cart-empty">Your cart is empty</div>';
  } else {
    el.innerHTML = cart.map((item, i) => `
      <div class="cart-item">
        <img class="cart-item-img" src="${item.img}" />
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-mem">${item.mem}</div>
        </div>
        <button class="cart-remove" onclick="removeFromCart(${i})">✕</button>
      </div>`).join('');
  }
  document.getElementById('cartModal').classList.add('open');
}

function closeCart() { document.getElementById('cartModal').classList.remove('open'); }

function removeFromCart(i) {
  cart.splice(i, 1);
  document.getElementById('cartCount').textContent = cart.length;
  openCart();
}

function placeOrder() {
  closeCart();
  document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
  document.getElementById('phase2').classList.add('active');

  setTimeout(() => {
    document.getElementById('successCircle').classList.add('pop');
    document.getElementById('successTitle').classList.add('show');
    spawnConfetti(250);
    setTimeout(() => document.getElementById('roadScene').classList.add('show'), 900);
    setTimeout(() => document.getElementById('truck').classList.add('drive'), 1100);
    document.getElementById('onWay').classList.add('show');
  }, 300);
}

function spawnConfetti(count) {
  const container = document.getElementById('confetti');
  const colors = ['#EBAE29','#f5c842','#fde88a','#22c55e','#60a5fa','#a78bfa','#f472b6','#fb923c','#ffffff','#ff6b6b'];
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const size = 4 + Math.random() * 10;
    piece.style.cssText = `
      left:${Math.random()*100}vw;top:-10px;
      width:${size}px;height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>0.5?'50%':'3px'};
      animation-delay:${Math.random()*0.8}s;
      animation-duration:${2+Math.random()*2.5}s;
    `;
    container.appendChild(piece);
    setTimeout(() => piece.remove(), 5000);
  }
}
</script>
