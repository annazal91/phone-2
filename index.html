<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>iPhone Credit</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#0e0f13;
  color:#fff;
}

/* HEADER */
header{
  padding:18px;
  text-align:center;
  font-weight:700;
  font-size:18px;
}

/* PRODUCTS */
.container{
  padding:15px;
}

.card{
  background:#1b1e27;
  display:flex;
  gap:12px;
  padding:12px;
  border-radius:14px;
  margin-bottom:12px;
  align-items:center;
  cursor:pointer;
}

.card img{
  width:85px;
  height:85px;
  object-fit:cover;
  border-radius:10px;
}

.card h3{
  font-size:15px;
}

.card p{
  font-size:12px;
  opacity:.7;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:100;
  padding:20px;
}

.modal-box{
  background:#1b1e27;
  width:100%;
  max-width:340px;
  border-radius:16px;
  padding:18px;
  text-align:center;
}

input[type=range]{
  width:100%;
  margin:20px 0;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2ecc71;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

/* SUCCESS */
.success{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#0e0f13;
  z-index:200;
}

.check{
  font-size:90px;
  color:#2ecc71;
}
</style>
</head>

<body>

<header>iPhone Purchase Program</header>

<div class="container">

  <div class="card" data-phone="iPhone 15">
    <img src="https://images.unsplash.com/photo-1695048133142-1c1d7b5e3c9a?w=500">
    <div>
      <h3>iPhone 15</h3>
      <p>New generation</p>
    </div>
  </div>

  <div class="card" data-phone="iPhone 15 Pro">
    <img src="https://images.unsplash.com/photo-1695653420142-5f7a9a1b3a7d?w=500">
    <div>
      <h3>iPhone 15 Pro</h3>
      <p>Titanium design</p>
    </div>
  </div>

  <div class="card" data-phone="iPhone 15 Pro Max">
    <img src="https://images.unsplash.com/photo-1695653420142-5f7a9a1b3a7d?w=500">
    <div>
      <h3>iPhone 15 Pro Max</h3>
      <p>Max performance</p>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h2 id="title">iPhone</h2>

    <p>Term credit (months)</p>

    <input id="range" type="range" min="0" max="12" value="6">
    <p><span id="val">6</span> months</p>

    <button id="confirmBtn">Confirm</button>
  </div>
</div>

<!-- SUCCESS -->
<div class="success" id="success">
  <div class="check">✔</div>
  <h2>Approved</h2>
</div>

<script>
const modal = document.getElementById("modal");
const title = document.getElementById("title");
const range = document.getElementById("range");
const val = document.getElementById("val");
const success = document.getElementById("success");

let selectedPhone = "";

/* OPEN CARDS (FIXED CLICK HANDLING) */
document.querySelectorAll(".card").forEach(card=>{
  card.addEventListener("click", ()=>{
    selectedPhone = card.dataset.phone;
    title.innerText = selectedPhone;
    modal.style.display = "flex";
  });
});

/* SLIDER */
range.addEventListener("input", ()=>{
  val.innerText = range.value;
});

/* CONFIRM */
document.getElementById("confirmBtn").addEventListener("click", ()=>{
  modal.style.display = "none";
  success.style.display = "flex";
});
</script>

</body>
</html>
